# ===================================================
# Server settings
# ===================================================
server.port=8082

# ===================================================
# MySQL Database connection
# Change username/password/db-name to match your setup
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bank_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=San@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / Hibernate settings
# "update" will auto create/update tables from the Entity classes
# so you do NOT have to create tables by hand.
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================
# JWT settings
# secret should be at least 32 characters for HS256
# expiration is in milliseconds (here: 24 hours)
# ===================================================
jwt.secret=ThisIsASimpleBankProjectSecretKeyForJWTAuthentication123
jwt.expiration=86400000

# ===================================================
# Default admin account
# This account is auto-created on first run if it does not exist
# Use these credentials to login as ADMIN
# ===================================================
app.admin.username=admin
app.admin.password=admin123
